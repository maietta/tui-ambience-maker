name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: TypeScript check
        run: npm run typecheck
        
      - name: Lint
        run: npm run lint || echo "No lint script, skipping"

  build-and-test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Build TypeScript
        run: npm run build
        
      - name: Test CLI help
        run: bun dist/cli.js --help
        
      - name: Test CLI generate (with test image)
        run: |
          convert -size 100x100 xc:blue test-image.jpg || magick convert -size 100x100 xc:blue test-image.jpg || true
          bun dist/cli.js generate test-image.jpg --name "ci-test" || true
          rm -f test-image.jpg ~/Downloads/ci-test.zip
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-ci
          path: |
            dist/
            !dist/**/*.map
          retention-days: 1
